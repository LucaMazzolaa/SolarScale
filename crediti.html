<!DOCTYPE html>

<html lang="it">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA SOLARE IN SCALA - Crediti</title>
    <link rel="icon" type="image/svg+xml" href="assets/sun_symbol.svg">
    
    <style>
        /* =========================================
           IMPORTAZIONE FONT E VARIABILI ROOT
           ========================================= */
        @font-face {
            font-family: 'Nasa';
            src: url('assets/nasa.ttf') format('truetype');
        }

        @font-face {
            font-family: 'Neue Montreal';
            src: url('assets/ppneuemontreal-book.otf') format('opentype');
            font-weight: 400;
        }

        @font-face {
            font-family: 'Neue Montreal';
            src: url('assets/ppneuemontreal-medium.otf') format('opentype');
            font-weight: 500;
        }

        :root {
            /* Dimensione fluida per il menu e i crediti */
            --font-16: clamp(14px, 0.3vw + 11.68px, 22px); 
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none; 
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Neue Montreal', sans-serif;
            font-weight: 400;
            background: black;
            color: white;
            overflow: hidden; 
            cursor: none; 
        }

        /* =========================================
           CURSORE PERSONALIZZATO
           ========================================= */
        .cursor-dot, .cursor-outline {
            position: fixed; 
            top: 0; 
            left: 0;
            transform: translate(-50%, -50%);
            border-radius: 50%; 
            z-index: 9999999; 
            pointer-events: none;
        }
        .cursor-dot {
            width: 5px; height: 5px;
            background: white; 
            mix-blend-mode: difference;
            transition: width .3s, height .3s;
        }
        .cursor-outline {
            width: 15px; height: 15px;
            border: 2px solid white; 
            mix-blend-mode: difference;
            transition: width .3s, height .3s;
        }
        .mouse-down { width: 20px !important; height: 20px !important; }
        .hover      { width: 30px !important; height: 30px !important; }

        /* ─── STARS ──────────────────────────────────────────────── */
        canvas.stars-canvas {
            position: fixed; left: 0; top: 0;
            z-index: 0; pointer-events: none;
        }

        /* =========================================
           TOP MENU (Sinistra e Destra)
           ========================================= */
        .menu {
            position: fixed;
            left: 4vh; 
            top: 4vh; 
            width: auto;
            font-family: 'Neue Montreal', sans-serif;
            font-size: var(--font-16); 
            font-weight: 500;
            z-index: 999999;
            display: flex;
            flex-direction: row; 
            align-items: center; 
            gap: 3vw; 
        }

        .right-menu {
            position: fixed;
            right: 4vh; 
            top: 4vh; 
            width: auto;
            font-family: 'Neue Montreal', sans-serif;
            font-size: var(--font-16); 
            font-weight: 500;
            z-index: 999999;
            display: flex;
            flex-direction: row; 
            align-items: center; 
            gap: 3vw; 
        }
        
        .nasa-title {
            font-weight: 700;
            font-size: clamp(22px, 2vw, 32px); 
            color: white;
            line-height: 1; 
            pointer-events: all;
            cursor: none;
            margin-right: 1.5vw;
            display: flex;
            align-items: center;
            gap: 0.5em;
            text-decoration: none;
        }

        .nasa-title img {
            height: 1em;
            width: auto;
            display: block;
            filter: brightness(0) invert(1);
        }

        .nav-link {
            font-family: 'Neue Montreal', sans-serif;
            color: white;
            text-decoration: none;
            transition: opacity 0.2s;
            cursor: none;
            opacity: 0.4; 
            display: flex;
            align-items: center;
            position: relative;
            padding: 4px 6px;
        }

        .text-label, .nasa-text-label {
            display: inline-block;
            line-height: 1;
            vertical-align: middle;
            white-space: nowrap;
            overflow: hidden;
            pointer-events: none; 
        }

        .nav-link::before { content: "["; opacity: 1; transition: opacity 0.2s; }
        .nav-link::after { content: "]"; opacity: 1; transition: opacity 0.2s; }
        .nav-link:hover, .nav-link.active { opacity: 1; }

        .nav-link:hover::before, .nav-link.active::before,
        .nav-link:hover::after, .nav-link.active::after {
            opacity: 1;
        }

        /* =========================================
           TESTO CREDITI (Effetto Cascata)
           ========================================= */
        .credits-block {
            position: fixed;
            bottom: 4vh; 
            left: 4vh;
            font-family: 'Neue Montreal', sans-serif;
            font-size: var(--font-16);
            font-weight: 400; 
            color: white;
            line-height: 1.5;
            z-index: 10;
            pointer-events: none; 
        }

        /* Elementi da animare in cascata */
        .cascade-item {
            opacity: 0; 
            animation: fadeUp 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        /* Ritardo per il secondo paragrafo */
        .cascade-item:nth-child(2) {
            animation-delay: 0.2s;
            margin-top: 1.5em; /* Sostituisce il doppio <br> per la spaziatura */
        }

        @keyframes fadeUp {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* =========================================
           RESPONSIVE MOBILE
           ========================================= */
        @media (max-width: 900px) {
            html, body { overflow-y: auto; overflow-x: hidden; }
            
            .menu { 
                position: relative; top: auto; left: auto; 
                width: calc(100% - 8vh); 
                flex-wrap: wrap; gap: 15px; margin-bottom: 15px; 
                align-items: flex-start; margin: 4vh 4vh 15px 4vh;
            }
            
            .right-menu { 
                position: relative; top: auto; right: auto; 
                margin: 0 4vh 4vh 4vh;
                display: flex;
                width: calc(100% - 8vh);
                flex-wrap: wrap; gap: 15px;
                align-items: flex-start;
            }
            
            .credits-block {
                position: relative;
                bottom: auto; left: auto;
                margin: 4vh;
            }
        }
    </style>
</head>
<body>

    <div class="cursor-dot" data-cursor-dot></div>
    <div class="cursor-outline" data-cursor-outline></div>

    <!-- STELLE DI SFONDO (identiche a dimensioni.html) -->
    <canvas id="stars"  class="stars-canvas"></canvas>
    <canvas id="stars2" class="stars-canvas"></canvas>
    <canvas id="stars3" class="stars-canvas"></canvas>

    <nav class="menu">
        <a href="index.html" class="nasa-title" id="logo-link">
            <img src="assets/sun_symbol.svg" alt="Sun symbol">
            <span class="nasa-text-label">SISTEMA SOLARE IN SCALA</span>
        </a>
        <a href="dimensioni.html" class="nav-link">
            <span class="text-label">Dimensioni</span>
        </a>
        <a href="posizioni.html" class="nav-link">
            <span class="text-label">Posizioni</span>
        </a>
        <a href="distanze.html" class="nav-link">
            <span class="text-label">Distanze</span>
        </a>
    </nav>

    <nav class="right-menu">
        <a href="misurazioni.html" class="nav-link">
            <span class="text-label">Metodi di misurazione</span>
        </a>
        <a href="crediti.html" class="nav-link active" id="crediti-link">
            <span class="text-label">Crediti</span>
        </a>
    </nav>

    <div class="credits-block">
        <p class="cascade-item">
            SUPSI DACD<br>
            Bachelor in Comunicazione visiva<br>
            A.A. 2025/26, CV2
        </p>
        <p class="cascade-item">
            Studente: Luca Mazzola<br>
            Modulo: CV429 Progetto II M&I<br>
            Docenti: Andreas Gysin & Giovanni Profeta
        </p>
    </div>

    <script>
        // -------------------------------------------------------------
        // LOGICA CURSORE CUSTOM
        // -------------------------------------------------------------
        const cursorDot = document.querySelector('[data-cursor-dot]');
        const cursorOutline = document.querySelector('[data-cursor-outline]');

        window.addEventListener('mousemove', e => {
            cursorDot.style.left = e.clientX + 'px';
            cursorDot.style.top  = e.clientY + 'px';
            cursorOutline.animate({ left: e.clientX + 'px', top: e.clientY + 'px' }, { duration: 250, fill: 'forwards' });
        });

        window.addEventListener('mousedown', () => cursorDot.classList.add('mouse-down'));
        window.addEventListener('mouseup',   () => cursorDot.classList.remove('mouse-down'));

        document.querySelectorAll('a').forEach(el => {
            el.addEventListener('mouseover', () => cursorOutline.classList.add('hover'));
            el.addEventListener('mouseleave',() => cursorOutline.classList.remove('hover'));
        });

        // -------------------------------------------------------------
        // RICALCOLO LARGHEZZA MENU DINAMICA E HACKER EFFECT
        // -------------------------------------------------------------
        const GLYPHS = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()_+-=[]{}|;:',.<>?/~`";
        const navLinks  = document.querySelectorAll('.nav-link');
        
        const logoLink      = document.getElementById('logo-link');
        const logoSpan      = logoLink.querySelector('.nasa-text-label');
        const logoOriginal  = logoSpan.innerText;
        const logoRef       = { id: null };

        function updateMenuWidths() {
            const currentLogoText = logoSpan.innerText;
            logoSpan.innerText = logoOriginal;
            logoSpan.style.width = 'auto';
            logoSpan.style.width = Math.ceil(logoSpan.getBoundingClientRect().width) + 'px';
            logoSpan.innerText = currentLogoText;

            navLinks.forEach(link => {
                const textSpan = link.querySelector('.text-label');
                if (textSpan) {
                    if (!textSpan.hasAttribute('data-original')) {
                        textSpan.setAttribute('data-original', textSpan.innerText);
                    }
                    const orig = textSpan.getAttribute('data-original');
                    const curr = textSpan.innerText;
                    
                    textSpan.innerText = orig;
                    textSpan.style.width = 'auto';
                    textSpan.style.width = Math.ceil(textSpan.getBoundingClientRect().width) + 'px';
                    textSpan.innerText = curr;
                }
            });
        }

        window.addEventListener('resize', updateMenuWidths);

        function hackerEffect(span, originalText, intervalRef) {
            let iteration = 0;
            clearInterval(intervalRef.id);
            intervalRef.id = setInterval(() => {
                span.innerText = originalText.split('').map((letter, i) => {
                    if (i < iteration) return originalText[i];
                    if (letter === ' ') return ' ';
                    return GLYPHS[Math.floor(Math.random() * GLYPHS.length)];
                }).join('');
                if (iteration >= originalText.length) clearInterval(intervalRef.id);
                iteration += 1;
            }, 40);
        }

        document.fonts.ready.then(() => {
            logoSpan.style.display    = 'inline-block';
            logoSpan.style.overflow   = 'hidden';
            logoSpan.style.whiteSpace = 'nowrap';
            
            navLinks.forEach(link => {
                const textSpan = link.querySelector('.text-label');
                if (textSpan) {
                    textSpan.style.display    = 'inline-block';
                    textSpan.style.overflow   = 'hidden';
                    textSpan.style.whiteSpace = 'nowrap';
                }
            });
            
            updateMenuWidths(); 
        });

        // Eventi Logo
        logoLink.addEventListener('mouseenter', () => hackerEffect(logoSpan, logoOriginal, logoRef));
        logoLink.addEventListener('mouseleave', () => {
            clearInterval(logoRef.id);
            logoSpan.innerText = logoOriginal;
        });

        // Eventi Links Menu
        navLinks.forEach(link => {
            const textSpan = link.querySelector('.text-label');
            if (!textSpan) return;

            const originalText = textSpan.innerText;
            const intervalRef  = { id: null };

            link.addEventListener('mouseenter', () => hackerEffect(textSpan, originalText, intervalRef));
            link.addEventListener('mouseleave', () => {
                clearInterval(intervalRef.id);
                textSpan.innerText = originalText;
            });
        });

        // -------------------------------------------------------------
        // STELLE DI SFONDO (identiche a dimensioni.html)
        // -------------------------------------------------------------
        class Stars {
            constructor(id, density, maxS, minS, maxSz, minSz) {
                this.canvas = document.getElementById(id);
                this.ctx = this.canvas.getContext('2d');
                this.density = density; this.maxS = maxS; this.minS = minS;
                this.maxSz = maxSz; this.minSz = minSz; this.dots = [];
                this.resize();
                window.addEventListener('resize', () => this.resize());
            }
            resize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
                this.lB = -window.innerWidth; this.rB = window.innerWidth * 2;
                this.num = Math.floor((window.innerWidth * window.innerHeight / 10000) * this.density);
                this.dots = [];
                for (let i = 0; i < this.num; i++) this.addDot(Math.random() * (this.rB - this.lB) + this.lB, Math.random() * window.innerHeight);
            }
            addDot(x, y) {
                this.dots.push({ x, y, s: Math.random()*(this.maxSz-this.minSz)+this.minSz, v: Math.random()*(this.maxS-this.minS)+this.minS });
            }
            draw(delta) {
                const ctx = this.ctx;
                ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                while (this.dots.length < this.num) this.addDot(delta > 0 ? this.rB : this.lB, Math.random() * window.innerHeight);
                for (let i = this.dots.length - 1; i >= 0; i--) {
                    const dot = this.dots[i], oldX = dot.x;
                    dot.x -= delta * dot.v;
                    ctx.beginPath(); ctx.moveTo(oldX, dot.y + dot.s/2); ctx.lineTo(dot.x, dot.y + dot.s/2);
                    ctx.strokeStyle = 'white'; ctx.lineWidth = dot.s; ctx.stroke();
                    if (dot.x < this.lB || dot.x > this.rB) this.dots.splice(i, 1);
                    else { ctx.fillStyle = 'white'; ctx.fillRect(dot.x, dot.y, dot.s, dot.s); }
                }
            }
        }

        const s1 = new Stars('stars',  1.5, 1.4,   0.1,  1.5, 0.5);
        const s2 = new Stars('stars2', 0.5, 0.25,  0.0,  1.0, 0.2);
        const s3 = new Stars('stars3', 0.2, 0.001, 0.0,  0.5, 0.1);

        // Su questa pagina non c'è movimento di camera, quindi delta = 0:
        // le stelle sono statiche, esattamente come appaiono a riposo in dimensioni.html.
        function animateStars() {
            requestAnimationFrame(animateStars);
            s1.draw(0);
            s2.draw(0);
            s3.draw(0);
        }
        animateStars();
    </script>
</body>
</html>
