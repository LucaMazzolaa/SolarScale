<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NASA // KINEMATIC 3D ENGINE - Absolute 1:1 Scale & Live Secular Drift</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>

    <style>
        :root {
            --bg-color: #000000;
            --orbit-color: rgba(255, 255, 255, 0.15);
            --ui-color: rgba(255, 255, 255, 0.4);
            --text-color: #ffffff;
            --font-main: monospace;
            
            /* DISTANZE (AU) */
            --au-mercury: 0.387;
            --au-venus: 0.723;
            --au-earth: 1.000;
            --au-mars: 1.524;
            --au-jupiter: 5.203;
            --au-saturn: 9.555;
            --au-uranus: 19.220;
            --au-neptune: 30.110;

            /* VOLUMI (Raggio Terra = 1) */
            --scale-mercury: 0.3825;
            --scale-venus: 0.9489;
            --scale-earth: 1.0000;
            --scale-mars: 0.5325;
            --scale-jupiter: 11.2092;
            --scale-saturn: 9.4494;
            --scale-uranus: 4.0074;
            --scale-neptune: 3.8827;
            --scale-sun: 109.1800; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-color); color: var(--text-color);
            font-family: var(--font-main);
            height: 100vh; display: flex; align-items: center; justify-content: center;
            overflow: hidden; 
        }

        /* -----------------------------------------------------------
           UI E HUD
           ----------------------------------------------------------- */
        .overlay-ui {
            position: absolute; top: 30px; left: 30px;
            font-size: 11px; color: #888; pointer-events: none; z-index: 100; line-height: 1.6;
        }
        .overlay-ui h1 { color: #ff3333; font-size: 16px; margin-bottom: 5px; letter-spacing: 1px; }
        
        .zoom-checkbox { display: none; }
        .zoom-btn {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            padding: 12px 24px; border: 1px solid #444; background: rgba(0, 0, 0, 0.8);
            color: #fff; font-size: 14px; cursor: pointer; z-index: 200;
            transition: all 0.3s ease; letter-spacing: 1px; backdrop-filter: blur(5px);
        }
        .zoom-btn:hover { border-color: #fff; background: rgba(0, 0, 0, 1); }
        .txt-out { display: none; }
        .zoom-checkbox:checked ~ .zoom-btn .txt-in { display: none; }
        .zoom-checkbox:checked ~ .zoom-btn .txt-out { display: inline; }

        /* -----------------------------------------------------------
           MOTORE GRAFICO: SCALA ASSOLUTA 1:1 (DISTANZE = VOLUMI)
           ----------------------------------------------------------- */
        .map-container {
            position: relative; width: 100vw; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            
            --au-to-vmin: 35vmin;      
            --planet-base: calc(var(--au-to-vmin) * 0.00008517);    
            --ui-ring-size: 2vmin;   
        }

        .zoom-checkbox:checked ~ .map-container {
            --au-to-vmin: 1.5vmin;     
            --planet-base: calc(var(--au-to-vmin) * 0.00008517); 
            --ui-ring-size: 0.6vmin;   
        }

        .orbit, .hud-ring, .sun-hud-ring, .planet-model, .sun-container {
            transition: width 2.5s cubic-bezier(0.4, 0, 0.2, 1), 
                        height 2.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* -----------------------------------------------------------
           SOLE
           ----------------------------------------------------------- */
        .sun-hud-ring {
            position: absolute; border-radius: 50%;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: var(--ui-ring-size); height: var(--ui-ring-size);
            border: 1px solid var(--ui-color); pointer-events: none; z-index: 11;
        }
        
        .sun-hud-ring::after {
            content: attr(data-name);
            position: absolute; left: calc(100% + 0.3vmin); top: 50%; transform: translateY(-50%);
            font-size: 1.2vmin; color: #555; letter-spacing: 1px; pointer-events: none;
        }

        .sun-container {
            position: absolute; z-index: 10;
            width: calc(var(--planet-base) * var(--scale-sun));
            height: calc(var(--planet-base) * var(--scale-sun));
        }

        /* -----------------------------------------------------------
           ORBITE E POSIZIONAMENTO ASTRONOMICO CORRETTO
           * Rotazione negativa per girare in senso antiorario
           ----------------------------------------------------------- */
        .orbit {
            position: absolute; border: 1px dashed var(--orbit-color); border-radius: 50%;
            top: 50%; left: 50%; 
            transform: translate(-50%, -50%) rotate(calc(var(--angle, 0deg) * -1));
            will-change: transform, width, height; 
        }

        .orb-mercury { width: calc(var(--au-to-vmin) * var(--au-mercury) * 2); height: calc(var(--au-to-vmin) * var(--au-mercury) * 2); }
        .orb-venus { width: calc(var(--au-to-vmin) * var(--au-venus) * 2); height: calc(var(--au-to-vmin) * var(--au-venus) * 2); }
        .orb-earth { width: calc(var(--au-to-vmin) * var(--au-earth) * 2); height: calc(var(--au-to-vmin) * var(--au-earth) * 2); }
        .orb-mars { width: calc(var(--au-to-vmin) * var(--au-mars) * 2); height: calc(var(--au-to-vmin) * var(--au-mars) * 2); }
        .orb-jupiter { width: calc(var(--au-to-vmin) * var(--au-jupiter) * 2); height: calc(var(--au-to-vmin) * var(--au-jupiter) * 2); }
        .orb-saturn { width: calc(var(--au-to-vmin) * var(--au-saturn) * 2); height: calc(var(--au-to-vmin) * var(--au-saturn) * 2); }
        .orb-uranus { width: calc(var(--au-to-vmin) * var(--au-uranus) * 2); height: calc(var(--au-to-vmin) * var(--au-uranus) * 2); }
        .orb-neptune { width: calc(var(--au-to-vmin) * var(--au-neptune) * 2); height: calc(var(--au-to-vmin) * var(--au-neptune) * 2); }

        /* -----------------------------------------------------------
           HUD RINGS E MODELLI 3D
           * left: 100% li sposta a "Ore 3" (0° astronomico reale)
           * Controrotazione var(--angle) per tenerli dritti
           ----------------------------------------------------------- */
        .hud-ring {
            position: absolute; border-radius: 50%; 
            top: 50%; left: 100%; /* Coordinate Polari 0° */
            transform: translate(-50%, -50%) rotate(var(--angle, 0deg));
            width: var(--ui-ring-size); height: var(--ui-ring-size);
            border: 1px solid var(--ui-color); pointer-events: none; will-change: transform;
        }
        
        .hud-ring::after {
            content: attr(data-name);
            position: absolute; left: calc(100% + 0.3vmin); top: 50%; transform: translateY(-50%);
            font-size: 1.2vmin; color: #555; letter-spacing: 1px; opacity: 1; transition: opacity 1s;
        }

        /* Mercurio a sinistra */
        .orb-mercury .hud-ring::after {
            left: auto; right: calc(100% + 0.3vmin); text-align: right; 
        }

        /* Venere in alto */
        .orb-venus .hud-ring::after {
            left: 50%; top: auto; bottom: calc(100% + 0.3vmin); 
            transform: translateX(-50%); text-align: center;
        }

        /* Marte in alto */
        .orb-mars .hud-ring::after {
            left: 50%; top: auto; bottom: calc(100% + 0.3vmin); 
            transform: translateX(-50%); text-align: center;
        }

        .planet-model {
            position: absolute; border-radius: 50%; 
            top: 50%; left: 100%; /* Coordinate Polari 0° */
            transform: translate(-50%, -50%) rotate(var(--angle, 0deg));
            width: calc(var(--planet-base) * var(--scale));
            height: calc(var(--planet-base) * var(--scale));
            display: flex; align-items: center; justify-content: center;
        }

        model-viewer {
            width: 100%; height: 100%;
            background-color: transparent; --poster-color: transparent; outline: none;
        }

        .pl-mercury { --scale: var(--scale-mercury); }
        .pl-venus { --scale: var(--scale-venus); }
        .pl-earth { --scale: var(--scale-earth); }
        .pl-mars { --scale: var(--scale-mars); }
        .pl-jupiter { --scale: var(--scale-jupiter); }
        .pl-saturn { --scale: var(--scale-saturn); }
        .pl-uranus { --scale: var(--scale-uranus); }
        .pl-neptune { --scale: var(--scale-neptune); }

    </style>
</head>
<body>

    <input type="checkbox" id="zoom-toggle" class="zoom-checkbox">

    <div class="overlay-ui">
        <h1>NASA // ABSOLUTE TRUE SCALE 1:1</h1>
        <p><strong>ATTENZIONE:</strong> Singola scala matematica applicata (1 AU = 149.5M km).</p>
        <p>A questa scala, i pianeti sono fisicamente <strong>più piccoli di un singolo pixel</strong>.</p>
        <p>Sistema coordinato polare corretto (0° = Eq. Primavera). Moto Antiorario Reale.</p>
        <p style="margin-top:10px; color:#fff;">SYNC JPL HORIZONS: <span id="live-date">...</span></p>
    </div>

    <label for="zoom-toggle" class="zoom-btn">
        <span class="txt-in">[ - ] ZOOM OUT: SISTEMA COMPLETO</span>
        <span class="txt-out">[ + ] ZOOM IN: SISTEMA INTERNO</span>
    </label>

    <div class="map-container">
        
        <div class="sun-hud-ring" data-name="[SOLE]"></div>
        <div class="sun-container">
            <model-viewer src="assets/sun.glb" bounds="tight" auto-rotate rotation-per-second="10deg" disable-zoom></model-viewer>
        </div>
        
        <div class="orbit orb-mercury">
            <div class="hud-ring" data-name="[MERCURIO]"></div>
            <div class="planet-model pl-mercury">
                <model-viewer src="assets/mercury.glb" bounds="tight" auto-rotate rotation-per-second="2deg" disable-zoom></model-viewer>
            </div>
        </div>
        
        <div class="orbit orb-venus">
            <div class="hud-ring" data-name="[VENERE]"></div>
            <div class="planet-model pl-venus">
                <model-viewer src="assets/venus.glb" bounds="tight" auto-rotate rotation-per-second="-1deg" disable-zoom></model-viewer>
            </div>
        </div>
        
        <div class="orbit orb-earth">
            <div class="hud-ring" data-name="[TERRA]"></div>
            <div class="planet-model pl-earth">
                <model-viewer src="assets/earth.glb" bounds="tight" auto-rotate rotation-per-second="20deg" disable-zoom></model-viewer>
            </div>
        </div>
        
        <div class="orbit orb-mars">
            <div class="hud-ring" data-name="[MARTE]"></div>
            <div class="planet-model pl-mars">
                <model-viewer src="assets/mars.glb" bounds="tight" auto-rotate rotation-per-second="19deg" disable-zoom></model-viewer>
            </div>
        </div>
        
        <div class="orbit orb-jupiter">
            <div class="hud-ring" data-name="[GIOVE]"></div>
            <div class="planet-model pl-jupiter">
                <model-viewer src="assets/jupiter.glb" bounds="tight" auto-rotate rotation-per-second="48deg" disable-zoom></model-viewer>
            </div>
        </div>
        
        <div class="orbit orb-saturn">
            <div class="hud-ring" data-name="[SATURNO]"></div>
            <div class="planet-model pl-saturn">
                <model-viewer src="assets/saturn.glb" bounds="tight" auto-rotate rotation-per-second="45deg" disable-zoom></model-viewer>
            </div>
        </div>
        
        <div class="orbit orb-uranus">
            <div class="hud-ring" data-name="[URANO]"></div>
            <div class="planet-model pl-uranus">
                <model-viewer src="assets/uranus.glb" bounds="tight" auto-rotate rotation-per-second="-15deg" disable-zoom></model-viewer>
            </div>
        </div>
        
        <div class="orbit orb-neptune">
            <div class="hud-ring" data-name="[NETTUNO]"></div>
            <div class="planet-model pl-neptune">
                <model-viewer src="assets/neptune.glb" bounds="tight" auto-rotate rotation-per-second="16deg" disable-zoom></model-viewer>
            </div>
        </div>

    </div>

    <script>
        /* * FORMULE DI VARIAZIONE SECOLARE (NASA JPL PLANETARY FACT SHEETS)
         * I valori includono la variazione (T) calcolata in secoli giuliani da J2000.
         * Questo garantisce la posizione *esatta* al millisecondo per la data odierna.
         */
        const keplerData = {
            'mercury': { L0: 252.2503, L_rate: 149472.6741, w0: 77.4577, w_rate: 0.1604, e0: 0.2056, e_rate: 0.000025 },
            'venus':   { L0: 181.9790, L_rate: 58519.2130,  w0: 131.5329, w_rate: 0.0012, e0: 0.0067, e_rate: -0.000049 },
            'earth':   { L0: 100.4645, L_rate: 35999.3724,  w0: 102.9376, w_rate: 0.3232, e0: 0.0167, e_rate: -0.000042 },
            'mars':    { L0: 355.4330, L_rate: 19141.6964,  w0: 336.0602, w_rate: 0.4438, e0: 0.0934, e_rate: 0.000114 },
            'jupiter': { L0: 34.3515,  L_rate: 3034.9037,   w0: 14.3312,  w_rate: 0.2155, e0: 0.0484, e_rate: 0.000128 },
            'saturn':  { L0: 50.0774,  L_rate: 1222.1137,   w0: 93.0567,  w_rate: 0.5665, e0: 0.0555, e_rate: -0.000346 },
            'uranus':  { L0: 314.0550, L_rate: 428.4669,    w0: 173.0052, w_rate: 0.0893, e0: 0.0463, e_rate: -0.000027 },
            'neptune': { L0: 304.3486, L_rate: 218.4611,    w0: 48.1202,  w_rate: 0.0253, e0: 0.0089, e_rate: 0.000008 }
        };

        const liveDateElement = document.getElementById('live-date');
        const epochJ2000 = new Date('2000-01-01T12:00:00Z');

        // Risolutore di Keplero (M = E - e*sinE) tramite metodo Newton-Raphson
        function solveKepler(M, e) {
            let E = M; 
            let delta = 1;
            while (Math.abs(delta) > 1e-6) {
                delta = (E - e * Math.sin(E) - M) / (1 - e * Math.cos(E));
                E -= delta;
            }
            return E;
        }

        function computeLiveTelemetry() {
            const now = new Date();
            const ms = String(now.getMilliseconds()).padStart(3, '0');
            liveDateElement.innerText = `${now.toLocaleDateString()} // ${now.toLocaleTimeString()}:${ms}`;
            
            const daysSinceJ2000 = (now - epochJ2000) / (1000 * 60 * 60 * 24);
            const T = daysSinceJ2000 / 36525; // Secoli giuliani passati da J2000

            for (const [planetId, data] of Object.entries(keplerData)) {
                
                // 1. Calcolo deriva secolare (Secular Variations)
                let L_deg = (data.L0 + data.L_rate * T) % 360;
                let w_deg = (data.w0 + data.w_rate * T) % 360;
                let e_current = data.e0 + data.e_rate * T;

                // 2. Anomalia Media
                let M_deg = (L_deg - w_deg) % 360;
                if (M_deg < 0) M_deg += 360;
                let M_rad = M_deg * Math.PI / 180;
                
                // 3. Anomalia Eccentrica
                let E_rad = solveKepler(M_rad, e_current);
                
                // 4. Anomalia Vera (sul piano orbitale ellittico)
                let trueAnomalyRad = 2 * Math.atan2(
                    Math.sqrt(1 + e_current) * Math.sin(E_rad / 2),
                    Math.sqrt(1 - e_current) * Math.cos(E_rad / 2)
                );
                
                // 5. Longitudine Eliotroprica Vera (Angolo da fornire al CSS)
                let currentAngle = ((trueAnomalyRad * 180 / Math.PI) + w_deg) % 360;
                if (currentAngle < 0) currentAngle += 360; 

                // Passa l'angolo pulito al CSS, che poi lo inverte per girare antiorario
                const orbitEl = document.querySelector(`.orb-${planetId}`);
                if (orbitEl) {
                    orbitEl.style.setProperty('--angle', `${currentAngle}deg`);
                }
            }
            requestAnimationFrame(computeLiveTelemetry);
        }

        computeLiveTelemetry();
    </script>
</body>
</html>
